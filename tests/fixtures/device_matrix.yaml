# Empirical device-behavior matrix — source of truth for per-firmware command
# availability. Cross-checked against command specs' ``firmware_families``
# declarations in ``tests/unit/test_device_matrix.py``.
#
# design.md §16.6 remains the narrative complement; this file is the data.
#
# Each entry is one (device_model, firmware, capture-date) triple. Entries
# append as new hardware appears — never silently edit an existing entry
# unless the original capture was mis-transcribed.
#
# Status taxonomy (uniform across every command block):
#   supported    device responds usefully; reply parses per the command spec
#   rejected     device returns `?` (AlicatCommandRejectedError) OR the command
#                is blocked pre-I/O by a library gate (firmware family /
#                min_firmware / DeviceKind / Capability) — in either case no
#                typed reply parses. §16.6.10 uses this status for gates that
#                emit zero tx frames on the wire; the provenance note spells
#                out which gate type fires.
#   silent       device returns nothing within a reasonable timeout
#   fallback     device returns a data frame instead of the proper reply
#                (common on pre-10v05 firmware when display LCK is active)
#   placeholder  degraded reply pattern such as ``A   1 ---``, ``A +0 1 ---``
#                or ``A   Feature Not Enabled`` (FPF on an absent statistic;
#                LS/LSS on a meter; ZCA/ZCP on 6v21)
#   adc_counts   pre-10v05 DCU returns raw ADC counts — different command
#                meaning entirely
#   untested     no capture yet; leave as default
#
# Prefix policy describes the SEPARATE treatment of reads (``??M*`` / ``??D*``
# / ``??G*`` / poll) vs writes on GP devices. On non-GP families the prefix
# is universally empty, so both read/write fields are ``none``.
#
# Dialect hints are short tags that code-side parsers can key off of.

