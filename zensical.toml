[project]
site_name = "alicatlib"
site_description = "Python library for Alicat mass flow meters and controllers."
site_url = "https://GraysonBellamy.github.io/alicatlib/"
repo_url = "https://github.com/GraysonBellamy/alicatlib"
repo_name = "GraysonBellamy/alicatlib"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"
nav = [
    { Home = "index.md" },
    { Installation = "installation.md" },
    { Quickstart = [
        { Async = "quickstart-async.md" },
        { Sync = "quickstart-sync.md" },
    ] },
    { Guides = [
        { Devices = "devices.md" },
        { Commands = "commands.md" },
        { "Data frames" = "data-frames.md" },
        { Streaming = "streaming.md" },
        { "Logging and acquisition" = "logging.md" },
        { Testing = "testing.md" },
        { Safety = "safety.md" },
        { Troubleshooting = "troubleshooting.md" },
    ] },
    { Benchmarks = "benchmarks.md" },
    { "API reference" = [
        { Overview = "api/index.md" },
        { "alicatlib" = "api/alicatlib.md" },
        { "alicatlib.commands" = "api/commands.md" },
        { "alicatlib.devices" = "api/devices.md" },
        { "alicatlib.manager" = "api/manager.md" },
        { "alicatlib.streaming" = "api/streaming.md" },
        { "alicatlib.sinks" = "api/sinks.md" },
        { "alicatlib.sync" = "api/sync.md" },
        { "alicatlib.transport" = "api/transport.md" },
        { "alicatlib.protocol" = "api/protocol.md" },
        { "alicatlib.registry" = "api/registry.md" },
        { "alicatlib.testing" = "api/testing.md" },
        { "alicatlib.errors" = "api/errors.md" },
        { "alicatlib.firmware" = "api/firmware.md" },
        { "alicatlib.config" = "api/config.md" },
    ] },
    { Design = "design.md" },
]

[project.theme]
variant = "classic"
features = [
    "content.code.copy",
    "content.code.annotate",
    "navigation.instant",
    "navigation.tracking",
    "navigation.sections",
    "navigation.indexes",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
merge_init_into_class = true
separate_signature = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
