default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-lock

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
        args: ["--ignore-words-list=aliuse,ags,als,unparseable"]

  # Local hooks — run type checkers via `uv run` against the same dep
  # groups CI uses, so the local typecheck env is identical to the CI
  # typecheck env. Avoids the additional_dependencies drift that plagued
  # the old mirrors-mypy setup (where the hook venv could see a different
  # set of optional extras than CI's `uv sync --group type --group test`).
  #
  # `--frozen` makes the hook fail loudly if uv.lock no longer satisfies
  # the requested groups (rather than silently re-resolving), so a stale
  # lockfile surfaces as a typecheck failure rather than a hidden drift.
  #
  # Runs on pre-push, not every commit — these are the slowest hooks here
  # and CI re-runs them anyway; pre-push is the right granularity for a
  # last-line-of-defense check that needs the full project venv.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (matches CI typecheck env)
        entry: uv run --frozen --group type --group test mypy
        language: system
        pass_filenames: false
        files: ^(src|tests)/
        stages: [pre-push]

      - id: pyright
        name: pyright (matches CI typecheck env)
        entry: uv run --frozen --group type --group test pyright
        language: system
        pass_filenames: false
        files: ^(src|tests)/
        stages: [pre-push]

      # codes.json → _codes_gen.py must be kept in sync.  The hook re-runs
      # `gen_codes.py --check` whenever codes.json or the generator itself
      # changes; on drift it prints a unified diff and blocks the commit.
      # CI re-runs the same check (jobs.codegen) as belt-and-braces.
      - id: codegen-check
        name: registry codegen (codes.json → _codes_gen.py)
        entry: uv run --frozen python scripts/gen_codes.py --check
        language: system
        pass_filenames: false
        files: ^(src/alicatlib/registry/data/codes\.json|scripts/gen_codes\.py|src/alicatlib/registry/_codes_gen\.py)$

ci:
  autoupdate_schedule: monthly
  # uv-driven local hooks; CI runs equivalents separately.
  skip: [mypy, pyright, codegen-check]
